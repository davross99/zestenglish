<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Zest English — Game 2 Preview: Paris</title> <style> * { box-sizing: border-box; margin: 0; padding: 0; } body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; } .game-wrap { max-width: 900px; width: 100%; background: #fff; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5); } .scene { width: 100%; aspect-ratio: 16 / 9; background-image: url('paris-game2.png'); background-size: cover; background-position: center; } .story-panel { background: linear-gradient(180deg, #fbf6e9, #f3ead3); border-top: 3px solid #d4af37; border-bottom: 3px solid #d4af37; padding: 26px 30px; } .story-text { font-family: Georgia, 'Times New Roman', serif; font-size: 1.25rem; line-height: 1.7; color: #3a2a12; margin-bottom: 20px; min-height: 3.4em; } .story-text .done-word { color: #7b4bd6; font-weight: 700; } .blank { display: inline-block; min-width: 60px; border-bottom: 3px solid #d4af37; } .boxes { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; } .box { background: linear-gradient(160deg, #9c6b3d 0%, #6b4423 55%, #4a2f18 100%); border: 3px solid #d4af37; border-radius: 6px 6px 10px 10px; color: #fff5d7; font-weight: 700; font-size: 0.95rem; padding: 24px 20px 16px; cursor: pointer; box-shadow: 0 6px 14px rgba(0,0,0,0.45), inset 0 0 0 2px rgba(255,215,0,0.2), inset 0 -4px 6px rgba(0,0,0,0.35); transition: transform 0.15s ease, box-shadow 0.15s ease; min-width: 110px; text-align: center; position: relative; } .box::before { content: ''; position: absolute; top: 13px; left: 6px; right: 6px; height: 3px; background: linear-gradient(90deg, transparent, #ffd700 20%, #ffd700 80%, transparent); opacity: 0.85; border-radius: 2px; } .box::after { content: ''; position: absolute; top: 6px; left: 50%; transform: translateX(-50%); width: 15px; height: 15px; background: radial-gradient(circle at 30% 30%, #ffe27a, #d4af37 60%, #8a6d1f); border-radius: 3px; box-shadow: 0 0 5px rgba(255,215,0,0.85); border: 1px solid #fff5d7; } .box:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); } .box.correct { background: linear-gradient(160deg, #5aa873 0%, #2d5c3a 55%, #1e3f27 100%); animation: pop 0.4s ease; } .box.wrong { animation: shake 0.4s ease; background: linear-gradient(160deg, #c0584a 0%, #7f1d13 55%, #5c130c 100%); } @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.12); } 100% { transform: scale(1); } } @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } } .footer { padding: 18px 24px; background: #f4f1fb; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; } .progress { display: flex; gap: 8px; } .dot { width: 12px; height: 12px; border-radius: 50%; background: #d8d0ee; } .dot.done { background: #7b4bd6; } .brand { font-weight: 700; color: #4a2c8f; font-size: 0.95rem; letter-spacing: 0.5px; } .complete-msg { display: none; text-align: center; padding: 20px 24px 0; } .complete-msg h2 { color: #4a2c8f; margin-bottom: 8px; } .complete-msg p { color: #555; } </style> </head> <body> <div class="game-wrap"> <div class="scene"></div> <div class="story-panel"> <div class="story-text" id="storyText"></div> <div class="boxes" id="boxes"></div> <div class="complete-msg" id="completeMsg"> <h2>Nice work! 🎉</h2> <p>This is a short preview of Game 2 — the full adventure launches later this year.</p> </div> </div> <div class="footer"> <div class="progress" id="progress"></div> <div class="brand">ZEST ENGLISH — Game 2 Preview</div> </div> </div> <script> const sentences = [ { before: "Jack and Jia are walking", after: "the river Seine.", answer: "next to", options: ["next to", "behind", "over"] }, { before: "The Eiffel Tower is", after: "them,", answer: "behind", options: ["behind", "under", "inside"] }, { before: "and look, Jack, the box is here", after: "the clocks!", answer: "between", options: ["between", "above", "below"] } ]; let current = 0; let storyHTML = ''; const storyTextEl = document.getElementById('storyText'); const boxesEl = document.getElementById('boxes'); const progressEl = document.getElementById('progress'); const boxesRow = document.getElementById('boxes'); const completeMsg = document.getElementById('completeMsg'); function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); } function renderProgress() { progressEl.innerHTML = ''; sentences.forEach((_, i) => { const d = document.createElement('div'); d.className = 'dot' + (i < current ? ' done' : ''); progressEl.appendChild(d); }); } function renderStory() { const s = sentences[current]; storyTextEl.innerHTML = storyHTML + ` ${s.before} <span class="blank">&nbsp;</span> ${s.after}`; } function renderBoxes() { const s = sentences[current]; boxesEl.innerHTML = ''; shuffle(s.options).forEach(opt => { const box = document.createElement('div'); box.className = 'box'; box.textContent = opt; box.onclick = () => handleChoice(opt, box, s.answer); boxesEl.appendChild(box); }); } function renderSentence() { renderStory(); renderBoxes(); renderProgress(); } function handleChoice(choice, boxEl, correctAnswer) { if (choice === correctAnswer) { boxEl.classList.add('correct'); document.querySelectorAll('.box').forEach(b => b.style.pointerEvents = 'none'); setTimeout(() => { const s = sentences[current]; storyHTML += ` ${s.before} <span class="done-word">${correctAnswer}</span> ${s.after}`; current++; if (current < sentences.length) { renderSentence(); } else { storyTextEl.innerHTML = storyHTML; boxesRow.style.display = 'none'; completeMsg.style.display = 'block'; renderProgress(); } }, 900); } else { boxEl.classList.add('wrong'); setTimeout(() => boxEl.classList.remove('wrong'), 400); } } renderSentence(); </script> </body> </html>
