<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zest English — Game 2 Preview: Paris</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1a1a2e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .game-wrap {
    max-width: 900px;
    width: 100%;
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .scene {
    width: 100%;
    aspect-ratio: 16 / 9;
    background-image: url('paris-game2.png');
    background-size: cover;
    background-position: center;
  }

  .story-panel {
    background: linear-gradient(180deg, #fbf6e9, #f3ead3);
    border-top: 3px solid #d4af37;
    border-bottom: 3px solid #d4af37;
    padding: 16px 24px;
  }

  .story-text {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 1.25rem;
    line-height: 1.6;
    color: #3a2a12;
    margin-bottom: 12px;
  }

  .story-text .done-word {
    color: #7b4bd6;
    font-weight: 700;
  }

  .blank {
    display: inline-block;
    min-width: 60px;
    border-bottom: 3px solid #d4af37;
  }

  .boxes {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .box {
    background-image:
      radial-gradient(circle 3.5px at 9px 9px, #ffe9a8 0%, #9c7a24 65%, transparent 70%),
      radial-gradient(circle 3.5px at calc(100% - 9px) 9px, #ffe9a8 0%, #9c7a24 65%, transparent 70%),
      radial-gradient(circle 3.5px at 9px calc(100% - 9px), #ffe9a8 0%, #9c7a24 65%, transparent 70%),
      radial-gradient(circle 3.5px at calc(100% - 9px) calc(100% - 9px), #ffe9a8 0%, #9c7a24 65%, transparent 70%),
      repeating-linear-gradient(38deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1.5px, transparent 1.5px, transparent 7px),
      linear-gradient(160deg, #b9895a 0%, #7a4f24 45%, #40280f 100%);
    border: 3px solid #c9a13d;
    border-radius: 5px;
    box-shadow:
      0 8px 16px rgba(0,0,0,0.5),
      inset 0 0 0 3px rgba(0,0,0,0.25),
      inset 0 2px 3px rgba(255,235,180,0.35),
      inset 0 -5px 8px rgba(0,0,0,0.5);
    color: #fff5d7;
    font-weight: 700;
    font-size: 0.95rem;
    padding: 18px 18px 12px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    min-width: 100px;
    text-align: center;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    position: relative;
  }

  .box::before {
    content: '';
    position: absolute;
    top: 11px;
    left: 14px;
    right: 14px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #ffd700 25%, #ffd700 75%, transparent);
    opacity: 0.8;
  }

  .box::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 50%;
    transform: translateX(-50%);
    width: 16px;
    height: 16px;
    background: conic-gradient(from 45deg, #fff5c2, #ffd700, #a8790f, #ffd700, #fff5c2);
    clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
    box-shadow: 0 0 5px rgba(255,215,0,0.85), 0 2px 3px rgba(0,0,0,0.5);
    border: 1px solid #7a5c12;
  }

  .box:hover {
    transform: translateY(-4px);
    box-shadow:
      0 12px 20px rgba(0,0,0,0.55),
      inset 0 0 0 3px rgba(0,0,0,0.25),
      inset 0 2px 3px rgba(255,235,180,0.4),
      inset 0 -5px 8px rgba(0,0,0,0.5);
  }

  .box.correct {
    background-image:
      radial-gradient(circle 3.5px at 9px 9px, #d4ffcf 0%, #4c8a4a 65%, transparent 70%),
      radial-gradient(circle 3.5px at calc(100% - 9px) 9px, #d4ffcf 0%, #4c8a4a 65%, transparent 70%),
      radial-gradient(circle 3.5px at 9px calc(100% - 9px), #d4ffcf 0%, #4c8a4a 65%, transparent 70%),
      radial-gradient(circle 3.5px at calc(100% - 9px) calc(100% - 9px), #d4ffcf 0%, #4c8a4a 65%, transparent 70%),
      repeating-linear-gradient(38deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1.5px, transparent 1.5px, transparent 7px),
      linear-gradient(160deg, #6fbf7f 0%, #2d5c3a 45%, #163b21 100%);
    animation: pop 0.4s ease;
  }

  .box.wrong {
    animation: shake 0.4s ease;
    background-image:
      radial-gradient(circle 3.5px at 9px 9px, #ffd6cf 0%, #a8402f 65%, transparent 70%),
      radial-gradient(circle 3.5px at calc(100% - 9px) 9px, #ffd6cf 0%, #a8402f 65%, transparent 70%),
      radial-gradient(circle 3.5px at 9px calc(100% - 9px), #ffd6cf 0%, #a8402f 65%, transparent 70%),
      radial-gradient(circle 3.5px at calc(100% - 9px) calc(100% - 9px), #ffd6cf 0%, #a8402f 65%, transparent 70%),
      repeating-linear-gradient(38deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1.5px, transparent 1.5px, transparent 7px),
      linear-gradient(160deg, #c0584a 0%, #7f1d13 45%, #4a0f08 100%);
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.12); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .footer {
    padding: 12px 24px;
    background: #f4f1fb;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  .progress {
    display: flex;
    gap: 8px;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #d8d0ee;
  }

  .dot.done {
    background: #7b4bd6;
  }

  .brand {
    font-weight: 700;
    color: #4a2c8f;
    font-size: 0.95rem;
    letter-spacing: 0.5px;
  }

  .complete-msg {
    display: none;
    text-align: center;
    padding: 20px 24px 0;
  }

  .complete-msg h2 {
    color: #4a2c8f;
    margin-bottom: 8px;
  }

  .complete-msg p {
    color: #555;
  }
</style>
</head>
<body>

<div class="game-wrap">
  <div class="scene"></div>

  <div class="story-panel">
    <div class="story-text" id="storyText"></div>
    <div class="boxes" id="boxes"></div>
    <div class="complete-msg" id="completeMsg">
      <h2>Nice work! 🎉</h2>
      <p>This is a short preview of Game 2 — the full adventure launches later this year.</p>
    </div>
  </div>

  <div class="footer">
    <div class="progress" id="progress"></div>
    <div class="brand">ZEST ENGLISH — Game 2 Preview</div>
  </div>
</div>

<script>
const sentences = [
  {
    before: "Jack and Jia are walking",
    after: "the river Seine.",
    answer: "next to",
    options: ["next to", "behind", "over"]
  },
  {
    before: "The Eiffel Tower is",
    after: "them,",
    answer: "behind",
    options: ["behind", "under", "inside"]
  },
  {
    before: "and look, Jack, the box is here",
    after: "the clocks!",
    answer: "between",
    options: ["between", "above", "below"]
  }
];

let current = 0;
let storyHTML = '';

const storyTextEl = document.getElementById('storyText');
const boxesEl = document.getElementById('boxes');
const progressEl = document.getElementById('progress');
const boxesRow = document.getElementById('boxes');
const completeMsg = document.getElementById('completeMsg');

function shuffle(arr) {
  return [...arr].sort(() => Math.random() - 0.5);
}

function renderProgress() {
  progressEl.innerHTML = '';
  sentences.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i < current ? ' done' : '');
    progressEl.appendChild(d);
  });
}

function renderStory() {
  const s = sentences[current];
  storyTextEl.innerHTML = storyHTML + ` ${s.before} <span class="blank">&nbsp;</span> ${s.after}`;
}

function renderBoxes() {
  const s = sentences[current];
  boxesEl.innerHTML = '';
  shuffle(s.options).forEach(opt => {
    const box = document.createElement('div');
    box.className = 'box';
    box.textContent = opt;
    box.onclick = () => handleChoice(opt, box, s.answer);
    boxesEl.appendChild(box);
  });
}

function renderSentence() {
  renderStory();
  renderBoxes();
  renderProgress();
}

function handleChoice(choice, boxEl, correctAnswer) {
  if (choice === correctAnswer) {
    boxEl.classList.add('correct');
    document.querySelectorAll('.box').forEach(b => b.style.pointerEvents = 'none');

    setTimeout(() => {
      const s = sentences[current];
      storyHTML += ` ${s.before} <span class="done-word">${correctAnswer}</span> ${s.after}`;
      current++;

      if (current < sentences.length) {
        renderSentence();
      } else {
        storyTextEl.innerHTML = storyHTML;
        boxesRow.style.display = 'none';
        completeMsg.style.display = 'block';
        renderProgress();
      }
    }, 900);
  } else {
    boxEl.classList.add('wrong');
    setTimeout(() => boxEl.classList.remove('wrong'), 400);
  }
}

renderSentence();
</script>

</body>
</html>
