
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zest English — Jack and the Temple of Shadows</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF8F4;
    --ink: #1E2233;
    --ink-soft: #4A4E5E;
    --gold: #B9862F;
    --gold-soft: #F4E8D2;
    --plum: #6B4E9E;
    --plum-soft: #EDE7F5;
    --line: #E8E3D9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--cream);
    color: var(--ink);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* HEADER */
  header {
    padding: 48px 0 8px;
    text-align: center;
  }

  .brand {
    font-weight: 800;
    font-size: 1.5rem;
    letter-spacing: 0.02em;
    color: var(--ink);
  }
  .brand span { color: var(--gold); }

  .brand-sub {
    margin-top: 4px;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--ink-soft);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .tagline {
    margin-top: 18px;
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gold);
  }

  /* HERO */
  .hero {
    text-align: center;
    padding: 40px 0 8px;
  }

  .hero img {
    width: 180px;
    height: 180px;
    border-radius: 32px;
    box-shadow: 0 16px 32px rgba(30, 34, 51, 0.16);
    margin-bottom: 28px;
  }

  .hero p {
    max-width: 600px;
    margin: 0 auto;
    font-size: 1.02rem;
    color: var(--ink-soft);
  }

  .hero p strong { color: var(--ink); font-weight: 600; }

  .divider {
    width: 48px;
    height: 3px;
    background: var(--gold-soft);
    border-radius: 2px;
    margin: 36px auto;
  }

  /* CORE CONTENT — THE EXERCISE */
  .exercise-eyebrow {
    text-align: center;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .exercise > h2 {
    text-align: center;
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1.3;
    max-width: 520px;
    margin: 0 auto 20px;
  }

  .exercise > p.lead {
    max-width: 600px;
    margin: 0 auto 8px;
    text-align: center;
    color: var(--ink-soft);
    font-size: 0.98rem;
  }

  /* AT/IN/ON SUBSECTION */
  .why {
    margin-top: 44px;
  }

  .why-eyebrow {
    text-align: center;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--plum);
    margin-bottom: 10px;
  }

  .why h3 {
    text-align: center;
    font-size: 1.3rem;
    font-weight: 700;
    line-height: 1.3;
    max-width: 520px;
    margin: 0 auto 20px;
  }

  .why p {
    max-width: 600px;
    margin: 0 auto 16px;
    text-align: center;
    color: var(--ink-soft);
    font-size: 0.98rem;
  }

  /* HOW TO PLAY */
  .how {
    max-width: 480px;
    margin: 36px auto 0;
    text-align: center;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 20px 24px;
  }

  .how span {
    display: block;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .how p {
    color: var(--ink-soft);
    font-size: 0.95rem;
  }

  /* WHAT'S INCLUDED */
  .included {
    margin: 44px 0 8px;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 22px 20px;
  }

  .card h3 {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--plum);
    margin-bottom: 10px;
  }

  .card p {
    font-size: 0.88rem;
    color: var(--ink-soft);
  }

  .lang-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 12px;
  }

  .lang-tags span {
    background: var(--gold-soft);
    color: var(--gold);
    font-size: 0.78rem;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 999px;
  }

  @media (max-width: 640px) {
    .cards { grid-template-columns: 1fr; }
  }

  /* SCREENSHOTS */
  .shots {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    max-width: 500px;
    margin: 44px auto 8px;
  }

  .shots figure {
    margin: 0;
  }

  .shots img {
    width: 100%;
    height: auto;
    border-radius: 14px;
    border: 1px solid var(--line);
    display: block;
  }

  .shots figcaption {
    text-align: center;
    font-size: 0.78rem;
    color: var(--ink-soft);
    margin-top: 8px;
  }

  @media (max-width: 560px) {
    .shots { grid-template-columns: 1fr; }
  }

  /* TEASER — COMING SOON */
  .teaser {
    margin: 64px 0 8px;
  }

  .teaser-eyebrow {
    text-align: center;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--plum);
    margin-bottom: 10px;
  }

  .teaser > h2 {
    text-align: center;
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1.35;
    max-width: 520px;
    margin: 0 auto 28px;
  }

  .teaser-cards {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }

  .teaser-card {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
  }

  .teaser-card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    display: block;
    opacity: 0.9;
  }

  .coming-soon-tag {
    position: absolute;
    top: 12px;
